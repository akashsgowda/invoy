name: invoy
description: Open-source Flutter invoice app for quick offline billing.
publish_to: 'none'
version: 2.1.2+4
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.10.8
  printing: ^5.12.0
  intl: ^0.19.0
  sqflite: ^2.3.0
  path: ^1.9.0
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  url_launcher: ^6.3.0
  file_picker: ^11.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
flutter_launcher_icons:
  android: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo_fg.png"
  min_sdk_android: 21
